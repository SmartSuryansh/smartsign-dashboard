<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSign — Inventory & OOS Impact</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#080c14;--cd:#0f1629;--cd2:#131b30;--hv:#1a2440;--bd:#1c2844;--bd2:#2a3a5c;--t1:#eef2ff;--t2:#b0bfe0;--t3:#6b7fa3;--tw:#fff;--cy:#00e5c8;--or:#ff9f43;--rd:#ff5b5b;--gn:#2ecc71;--pu:#a78bfa;--yl:#f1c40f;--mo:'JetBrains Mono',monospace;--sa:'DM Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--t1);font-family:var(--sa);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.w{max-width:1500px;margin:0 auto;padding:28px 36px;position:relative;z-index:1;}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--bd);}
.hdr-l .cr{font:600 10px/1 var(--mo);letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:10px;}.hdr-l .cr a{color:var(--cy);text-decoration:none;}
.hdr-l h1{font:800 32px/1.1 var(--mo);background:linear-gradient(135deg,var(--rd),var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-l .sub{font:500 13px/1 var(--mo);color:var(--t3);margin-top:6px;}
.hero{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px;}
.hc{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:22px 20px;position:relative;overflow:hidden;transition:all .25s;}
.hc:hover{border-color:var(--cy);transform:translateY(-2px);}
.hc::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:14px 0 0 14px;}
.hc.c1::before{background:var(--cy);}.hc.c2::before{background:var(--gn);}.hc.c3::before{background:var(--rd);}.hc.c4::before{background:var(--or);}.hc.c5::before{background:var(--pu);}
.hc .lb{font:600 10px/1 var(--mo);letter-spacing:1.8px;text-transform:uppercase;color:var(--t3);margin-bottom:10px;}
.hc .vl{font:800 30px/1 var(--mo);color:var(--tw);}
.hc .dt{font:500 12px/1.4 var(--mo);color:var(--t2);margin-top:8px;}
.up{color:var(--gn)!important;}.dn{color:var(--rd)!important;}
.sc{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:26px;margin-bottom:24px;}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.st{font:700 13px/1 var(--mo);letter-spacing:1.2px;text-transform:uppercase;color:var(--t2);}
.cb{height:320px;position:relative;}.cbs{height:260px;position:relative;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}.g2 .sc{margin-bottom:0;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px;}.g3 .sc{margin-bottom:0;}
/* Impact cards */
.imp{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.imc{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:22px;transition:all .25s;}
.imc:hover{border-color:var(--or);}
.imc .im-h{font:700 14px/1 var(--mo);color:var(--or);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
.imc .im-r{display:flex;justify-content:space-between;padding:6px 0;font:500 12px/1.3 var(--mo);}
.imc .im-l{color:var(--t3);}.imc .im-v{color:var(--t1);font-weight:600;}
.imc .im-d{font-weight:700;font-size:11px;margin-left:8px;}
/* Table */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-family:var(--mo);}
thead th{padding:12px 12px;text-align:right;font:700 10px/1 var(--mo);text-transform:uppercase;letter-spacing:1px;color:var(--t3);border-bottom:2px solid var(--bd2);white-space:nowrap;}
thead th:first-child{text-align:left;}
tbody td{padding:10px 12px;text-align:right;font:500 12px/1.2 var(--mo);color:var(--t2);border-bottom:1px solid #1c284422;white-space:nowrap;}
tbody td:first-child{text-align:left;color:var(--t1);font-weight:600;}
tbody tr:hover{background:var(--hv);}
.bar-inline{display:inline-block;height:8px;border-radius:4px;margin-right:8px;vertical-align:middle;}
/* Fulfillment pills */
.ful-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.ful-card{background:var(--cd2);border:1px solid var(--bd);border-radius:12px;padding:20px;text-align:center;}
.ful-card .fn{font:700 12px/1 var(--mo);color:var(--t2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.ful-card .fv{font:800 24px/1 var(--mo);color:var(--tw);}
.ful-card .fd{font:500 11px/1.3 var(--mo);color:var(--t2);margin-top:8px;}
.ful-card .fb{width:100%;height:6px;background:var(--bd);border-radius:3px;margin-top:10px;overflow:hidden;}
.ful-card .fi{height:100%;border-radius:3px;}
.ft{text-align:center;padding:28px;font:500 11px/1 var(--mo);color:var(--t3);border-top:1px solid var(--bd);margin-top:24px;}
@media(max-width:1200px){.hero{grid-template-columns:repeat(3,1fr);}.g2,.imp{grid-template-columns:1fr;}}
@media(max-width:768px){.hero{grid-template-columns:1fr 1fr;}.hdr{flex-direction:column;gap:16px;}.w{padding:16px;}}
</style>
</head>
<body>
<div class="w">
<div class="hdr"><div class="hdr-l"><div class="cr"><a href="#">← Dashboard Hub</a> / Inventory & OOS</div><h1>Inventory & OOS Impact</h1><div class="sub">ASIN Status Tracking · YoY Revenue Impact Analysis</div></div></div>
<div id="app"><div style="text-align:center;padding:80px;font:500 14px var(--mo);color:var(--t3);">Loading…</div></div>
<div class="ft">SmartSign USA · Inventory & OOS Impact Dashboard · Updated via JSON</div>
</div>
<script>
const FILE='oos_data.json';
const $=s=>document.querySelector(s);
const F={k:n=>'$'+(Math.abs(n)>=1e3?(n/1e3).toFixed(1)+'K':Math.round(n).toLocaleString()),n:n=>Math.round(n).toLocaleString(),
  dp:(c,p)=>{if(!p||p===0)return{t:'—',c:''};const d=((c-p)/Math.abs(p))*100;return{t:(d>=0?'+':'')+d.toFixed(0)+'%',c:d>=0?'up':'dn'}}};
let CH={},DATA;

async function init(){
  try{const r=await fetch(FILE);DATA=await r.json();render();}
  catch(e){$('#app').innerHTML=`<p style="text-align:center;padding:80px;color:var(--rd);font:500 14px var(--mo)">Could not load oos_data.json<br><small style="color:var(--t3)">${e.message}</small></p>`;}}

function render(){
  const S=DATA.summary;
  const totalRevLost=DATA.impact.reduce((s,i)=>s+(i.total_sales_25-i.total_sales_26),0);

  $('#app').innerHTML=`
    <div class="hero">
      <div class="hc c1"><div class="lb">Total ASINs</div><div class="vl">${F.n(S.total_asins)}</div><div class="dt">${S.categories} categories tracked</div></div>
      <div class="hc c2"><div class="lb">Active</div><div class="vl up">${F.n(S.active)}</div><div class="dt">${(S.active/S.total_asins*100).toFixed(1)}% of catalog</div></div>
      <div class="hc c3"><div class="lb">Inactive / OOS</div><div class="vl dn">${F.n(S.inactive)}</div><div class="dt">${(S.inactive/S.total_asins*100).toFixed(1)}% of catalog</div></div>
      <div class="hc c4"><div class="lb">Newly Inactive</div><div class="vl" style="color:var(--or)">${S.newly_inactive}</div><div class="dt">went inactive this week</div></div>
      <div class="hc c5"><div class="lb">Est. Revenue Lost</div><div class="vl dn">${F.k(totalRevLost)}</div><div class="dt">Jan–Mar YoY gap from OOS ASINs</div></div>
    </div>

    <div class="g2">
      <div class="sc"><div class="sh"><div class="st">Weekly Status Timeline</div></div><div class="cb"><canvas id="tlChart"></canvas></div></div>
      <div class="sc"><div class="sh"><div class="st">Inactive % Over Time</div></div><div class="cb"><canvas id="pctChart"></canvas></div></div>
    </div>

    <div class="sc"><div class="sh"><div class="st">Monthly YoY Impact · Inactive ASINs</div></div>
    <div class="imp" id="impArea"></div></div>

    <div class="sc"><div class="sh"><div class="st">Revenue Impact · 2026 vs 2025</div></div><div class="cbs"><canvas id="impChart"></canvas></div></div>

    <div class="g2">
      <div class="sc"><div class="sh"><div class="st">Fulfillment Split</div></div><div class="ful-grid" id="fulArea"></div></div>
      <div class="sc"><div class="sh"><div class="st">Top Categories by Inactive Count</div></div><div class="cbs"><canvas id="catChart"></canvas></div></div>
    </div>

    <div class="sc"><div class="sh"><div class="st">Category Breakdown</div></div>
    <div class="tw"><table><thead><tr>
      <th style="text-align:left">Category</th><th>Total</th><th>Active</th><th>Inactive</th><th>Inactive %</th><th>Distribution</th><th>Newly Inactive</th><th>Newly Active</th>
    </tr></thead><tbody id="catTbl"></tbody></table></div></div>

    <div class="sc"><div class="sh"><div class="st">Subcategory Detail (Top 40)</div></div>
    <div class="tw"><table><thead><tr>
      <th style="text-align:left">Category</th><th style="text-align:left">Subcategory</th><th>Total</th><th>Active</th><th>Inactive</th><th>Inactive %</th>
    </tr></thead><tbody id="subTbl"></tbody></table></div></div>
  `;

  buildTimeline();buildImpact();buildFulfillment();buildCatChart();buildCatTable();buildSubTable();
}

function buildTimeline(){
  const tl=DATA.timeline;const lb=tl.map(t=>t.week);
  const tt={backgroundColor:'#1a2440',titleColor:'#eef2ff',bodyColor:'#b0bfe0',borderColor:'#2a3a5c',borderWidth:1,titleFont:{family:'JetBrains Mono',size:12},bodyFont:{family:'JetBrains Mono',size:11},padding:12};

  if(CH.tl)CH.tl.destroy();
  CH.tl=new Chart($('#tlChart'),{type:'bar',data:{labels:lb,datasets:[
    {label:'Active',data:tl.map(t=>t.active),backgroundColor:'#2ecc7166',borderColor:'#2ecc71',borderWidth:1,borderRadius:3},
    {label:'Inactive',data:tl.map(t=>t.inactive),backgroundColor:'#ff5b5b66',borderColor:'#ff5b5b',borderWidth:1,borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#b0bfe0',font:{family:'JetBrains Mono',size:11}}},tooltip:tt},
  scales:{x:{stacked:true,ticks:{color:'#6b7fa3',font:{family:'JetBrains Mono',size:10}},grid:{color:'#1c284422'}},y:{stacked:true,ticks:{color:'#6b7fa3',font:{family:'JetBrains Mono',size:10},callback:v=>(v/1e3).toFixed(0)+'K'},grid:{color:'#1c284422'}}}}});

  if(CH.pct)CH.pct.destroy();
  CH.pct=new Chart($('#pctChart'),{type:'line',data:{labels:lb,datasets:[
    {label:'Inactive %',data:tl.map(t=>t.inactive_pct),borderColor:'#ff5b5b',backgroundColor:'rgba(255,91,91,.1)',tension:.3,fill:true,pointRadius:4,pointBackgroundColor:'#ff5b5b',borderWidth:2.5}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...tt,callbacks:{label:c=>c.parsed.y.toFixed(1)+'%'}}},
  scales:{x:{ticks:{color:'#6b7fa3',font:{family:'JetBrains Mono',size:10}},grid:{color:'#1c284422'}},y:{ticks:{color:'#6b7fa3',font:{family:'JetBrains Mono',size:10},callback:v=>v+'%'},grid:{color:'#1c284422'}}}}});
}

function buildImpact(){
  const imp=DATA.impact;
  $('#impArea').innerHTML=imp.map(i=>{
    const rows=[
      ['Inactive ASINs',i.inactive_asins,null],
      ['Total Sales',F.k(i.total_sales_26),F.dp(i.total_sales_26,i.total_sales_25)],
      ['Ad Sales',F.k(i.ad_sales_26),F.dp(i.ad_sales_26,i.ad_sales_25)],
      ['Sessions',F.n(i.sessions_26),F.dp(i.sessions_26,i.sessions_25)],
      ['Spend',F.k(i.spend_26),F.dp(i.spend_26,i.spend_25)],
      ['Total Orders',F.n(i.total_orders_26),F.dp(i.total_orders_26,i.total_orders_25)],
    ];
    return`<div class="imc"><div class="im-h">${i.month} 2026 vs 2025</div>${rows.map(([l,v,d])=>
      `<div class="im-r"><span class="im-l">${l}</span><span><span class="im-v">${v}</span>${d?`<span class="im-d ${d.c}">${d.t}</span>`:''}</span></div>`
    ).join('')}</div>`;
  }).join('');

  // Impact bar chart
  if(CH.imp)CH.imp.destroy();
  CH.imp=new Chart($('#impChart'),{type:'bar',data:{labels:imp.map(i=>i.month),datasets:[
    {label:'2026 T-Sales',data:imp.map(i=>i.total_sales_26),backgroundColor:'#00e5c866',borderColor:'#00e5c8',borderWidth:1,borderRadius:6},
    {label:'2025 T-Sales',data:imp.map(i=>i.total_sales_25),backgroundColor:'#ff9f4344',borderColor:'#ff9f43',borderWidth:1,borderRadius:6}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#b0bfe0',font:{family:'JetBrains Mono',size:11}}},
  tooltip:{backgroundColor:'#1a2440',titleColor:'#eef2ff',bodyColor:'#b0bfe0',borderColor:'#2a3a5c',borderWidth:1,padding:12,titleFont:{family:'JetBrains Mono'},bodyFont:{family:'JetBrains Mono'},
    callbacks:{label:c=>`${c.dataset.label}: $${Math.round(c.parsed.y).toLocaleString()}`}}},
  scales:{x:{ticks:{color:'#6b7fa3',font:{family:'JetBrains Mono',size:12}},grid:{color:'#1c284422'}},y:{ticks:{color:'#6b7fa3',font:{family:'JetBrains Mono',size:11},callback:v=>'$'+(v/1e3).toFixed(0)+'K'},grid:{color:'#1c284422'}}}}});
}

function buildFulfillment(){
  const ful=DATA.fulfillment.filter(f=>f.fulfillment&&f.fulfillment!=='Unknown');
  $('#fulArea').innerHTML=ful.map(f=>{
    const pct=f.total>0?(f.inactive/f.total*100).toFixed(1):0;
    const actPct=f.total>0?(f.active/f.total*100):0;
    return`<div class="ful-card"><div class="fn">${f.fulfillment}</div><div class="fv">${F.n(f.total)}</div>
    <div class="fd"><span class="up">${F.n(f.active)} active</span> · <span class="dn">${F.n(f.inactive)} inactive (${pct}%)</span></div>
    <div class="fb"><div class="fi" style="width:${actPct}%;background:linear-gradient(90deg,var(--gn),#4ade80)"></div></div></div>`;
  }).join('');
}

function buildCatChart(){
  const cats=DATA.categories.slice(0,12);
  if(CH.cat)CH.cat.destroy();
  CH.cat=new Chart($('#catChart'),{type:'bar',data:{labels:cats.map(c=>c.category),datasets:[
    {label:'Inactive',data:cats.map(c=>c.inactive),backgroundColor:'#ff5b5b66',borderColor:'#ff5b5b',borderWidth:1,borderRadius:4},
    {label:'Active',data:cats.map(c=>c.active),backgroundColor:'#2ecc7133',borderColor:'#2ecc71',borderWidth:1,borderRadius:4}
  ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#b0bfe0',font:{family:'JetBrains Mono',size:10}}},
  tooltip:{backgroundColor:'#1a2440',titleColor:'#eef2ff',bodyColor:'#b0bfe0',borderColor:'#2a3a5c',borderWidth:1,padding:12}},
  scales:{x:{stacked:true,ticks:{color:'#6b7fa3',font:{family:'JetBrains Mono',size:10}},grid:{color:'#1c284422'}},y:{stacked:true,ticks:{color:'#b0bfe0',font:{family:'JetBrains Mono',size:11}},grid:{display:false}}}}});
}

function buildCatTable(){
  const cats=DATA.categories;const maxI=Math.max(...cats.map(c=>c.inactive));
  $('#catTbl').innerHTML=cats.map(c=>{
    const barW=maxI>0?(c.inactive/maxI*100):0;
    const actW=c.total_asins>0?(c.active/c.total_asins*100):0;
    return`<tr>
      <td>${c.category}</td><td>${F.n(c.total_asins)}</td>
      <td class="up">${F.n(c.active)}</td><td class="dn">${F.n(c.inactive)}</td>
      <td>${c.inactive_pct}%</td>
      <td><div style="display:flex;align-items:center;justify-content:flex-end;gap:6px"><div style="width:120px;height:8px;background:var(--bd);border-radius:4px;overflow:hidden"><div style="width:${actW}%;height:100%;background:var(--gn);border-radius:4px"></div></div><span style="font-size:10px;color:var(--t3)">${actW.toFixed(0)}%</span></div></td>
      <td style="color:var(--or)">${c.newly_inactive||'—'}</td>
      <td style="color:var(--cy)">${c.newly_active||'—'}</td>
    </tr>`;
  }).join('');
}

function buildSubTable(){
  const subs=DATA.subcategories.slice(0,40);
  $('#subTbl').innerHTML=subs.map(s=>`<tr>
    <td>${s.category}</td><td style="text-align:left;color:var(--t2)">${s.subcategory}</td>
    <td>${F.n(s.total)}</td><td class="up">${F.n(s.active)}</td><td class="dn">${F.n(s.inactive)}</td><td>${s.inactive_pct}%</td>
  </tr>`).join('');
}

init();
</script>
</body>
</html>
