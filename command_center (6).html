  LOG_STATE={mode:'single',campaigns:[campName],date:new Date().toISOString().split('T')[0],types:['keyword_add','asin_add'],notes:`Harvest: promote target ${targetAsin} to Manual Exact campaign (auto-suggested by Hunt mode)`,owner:CFG.harvest_owner||'Rashmi Jain',portfolio:''};
  const c=D.campaigns.find(x=>x.n===campName);if(c)LOG_STATE.portfolio=c.p||'';
  renderLogDialog();$('#logBg').classList.add('show');
}

function logHarvestST(searchTerm,campName){
  // Search-term grain harvest: promote search term to Manual Exact campaign
  LOG_STATE={mode:'single',campaigns:[campName],date:new Date().toISOString().split('T')[0],types:['keyword_add'],notes:`Harvest: promote search term "${searchTerm}" to Manual Exact campaign (source: ${campName.substring(0,40)})`,owner:CFG.harvest_owner||'Rashmi Jain',portfolio:''};
  const c=D.campaigns.find(x=>x.n===campName);if(c)LOG_STATE.portfolio=c.p||'';
  renderLogDialog();$('#logBg').classList.add('show');
}
function logRealloc(fromCamp,toCamp,shift){
  LOG_STATE={mode:'single',campaigns:[fromCamp,toCamp],date:new Date().toISOString().split('T')[0],types:['budget_decrease','budget_increase'],notes:`Reallocation: shift $${shift}/week from "${fromCamp.substring(0,40)}" to "${toCamp.substring(0,40)}"`,owner:'',portfolio:''};
  const c=D.campaigns.find(x=>x.n===fromCamp);if(c){LOG_STATE.portfolio=c.p||'';LOG_STATE.owner=ownerForPortfolio(c.p);}
  // multi-campaign so use single mode but with pre-filled list — UI displays first, dialog confirms
  // Switch to portfolio mode if both belong to same portfolio
  renderLogDialog();$('#logBg').classList.add('show');
}

// ==================== WEEKLY BRIEFING GENERATOR ====================

function openBriefing(){
  $('#bfBg').classList.add('show');
  renderBriefing();
}
function closeBriefing(){$('#bfBg').classList.remove('show');}

function buildBriefingData(){
  // Period: last full Sun-Sat (Sun-to-Sat aligned). If today is Mon, use last week. Otherwise use most recent Sun-Sat.
  const last=latestDataDate();if(!last)return null;
  const lastD=dParse(last);
  // Find the most recent Saturday <= last
  const dow=lastD.getDay(); // 0=Sun ... 6=Sat
  const daysToSat=(dow-6+7)%7;
  const wkEnd=new Date(lastD);wkEnd.setDate(wkEnd.getDate()-daysToSat);
  const wkStart=new Date(wkEnd);wkStart.setDate(wkStart.getDate()-6);
  // Previous week
  const pwEnd=new Date(wkStart);pwEnd.setDate(pwEnd.getDate()-1);
  const pwStart=new Date(pwEnd);pwStart.setDate(pwStart.getDate()-6);
  const tw={s:dStr(wkStart),e:dStr(wkEnd)};
  const pw={s:dStr(pwStart),e:dStr(pwEnd)};

  // Aggregate this week vs prev week (SC default per CFG)
  const ch=CFG.briefing?.channel||'SC';
  // We don't have channel-tagged campaigns in cc_data — assume SC for now (the data file is SC)
  const all=D.campaigns;
  const tw_agg=aggMulti(all.map(c=>c.n),tw.s,tw.e);
  const pw_agg=aggMulti(all.map(c=>c.n),pw.s,pw.e);
  const dPct=(a,b)=>b>0?((a-b)/b*100).toFixed(0):'—';
  const headlines={
    paid_orders:dPct(tw_agg.orders,pw_agg.orders),
    ad_sales:dPct(tw_agg.sales,pw_agg.sales),
    ad_spend:dPct(tw_agg.spend,pw_agg.spend),
    impressions:dPct(tw_agg.imp,pw_agg.imp),
    clicks:dPct(tw_agg.clicks,pw_agg.clicks),
    roas_delta:tw_agg.roas-pw_agg.roas
  };

  // Detect winners (campaigns where ROAS ≥ 4 with sales ↑ ≥ 20% WoW)
  const wins=[];
  D.campaigns.forEach(c=>{
    const t=agg(c,tw.s,tw.e);
    if(t.spend<100||t.roas<3)return;
    const p=agg(c,pw.s,pw.e);
    const dSales=p.sales>0?(t.sales-p.sales)/p.sales*100:0;
    if(dSales>=20&&t.roas>=3){
      wins.push({n:c.n,p:c.p,roas:t.roas,sales:t.sales,delta:dSales});
    }
  });
  wins.sort((a,b)=>b.sales-a.sales);

  // Detect alerts (campaigns where ROAS ↓ ≥ 30% WoW with spend > $200)
  const alerts=[];
  D.campaigns.forEach(c=>{
    const t=agg(c,tw.s,tw.e);
    if(t.spend<200)return;
    const p=agg(c,pw.s,pw.e);
    if(!p.roas)return;
    const dRoas=(t.roas-p.roas)/p.roas*100;
    if(dRoas<=-30){
      alerts.push({n:c.n,p:c.p,roas:t.roas,prev_roas:p.roas,spend:t.spend,delta:dRoas});
    }
  });
  alerts.sort((a,b)=>b.spend-a.spend);

  // Recent actions logged (last 7 days)
  const recentActs=ACTIONS.filter(a=>a.date>=tw.s&&a.date<=tw.e);

  return{tw,pw,tw_agg,pw_agg,headlines,wins:wins.slice(0,CFG.briefing?.max_wins||3),alerts:alerts.slice(0,CFG.briefing?.max_alerts||3),actions:recentActs};
}

function renderBriefing(){
  const b=buildBriefingData();
  if(!b){$('#bfMdl').innerHTML='<div class="lg-h"><h3>Briefing</h3><button class="cls" onclick="closeBriefing()">✕</button></div><div class="lg-body"><p style="padding:30px;text-align:center;color:var(--t3)">No data available to build briefing.</p></div>';return;}

  // Build email-style draft
  const wkLabel=`${dParse(b.tw.s).toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${dParse(b.tw.e).toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  const pwLabel=`${dParse(b.pw.s).toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${dParse(b.pw.e).toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  const sign=v=>v>=0?'+'+v:''+v;
  const arr=v=>v>=0?'▲':'▼';
  const winsTxt=b.wins.map(w=>`• ${w.n.substring(0,55)} — ${F.d(w.sales)} sales (${sign(Math.round(w.delta))}% WoW) at ${F.r(w.roas)} ROAS`).join('\n')||'• No standout wins this week';
  const alertsTxt=b.alerts.map(a=>`• ${a.n.substring(0,55)} — ROAS ${F.r(a.prev_roas)} → ${F.r(a.roas)} on ${F.d(a.spend)} spend`).join('\n')||'• No critical alerts this week';
  const actionsTxt=b.actions.length?b.actions.map(a=>`• ${a.action_types.map(t=>(ACT_META[t]||{}).l||t).join(' + ')} on ${a.campaigns.length} campaign(s) (${a.owner||'unassigned'})${a.notes?' — '+a.notes.substring(0,80):''}`).join('\n'):'• No actions logged through tracker this week';

  const subject=`Re: Amazon - Weekly Performance Review & Key Action Drivers | ${new Date().getFullYear()}`;
  const draft=`Hi Lesa,

Sharing the weekly report and budget status for ${wkLabel} (vs ${pwLabel}), along with key actions and goal achievement updates.

#Headlines (SC, WoW)
• Ad orders ${sign(b.headlines.paid_orders)}% ${arr(b.headlines.paid_orders)}
• Ad sales ${sign(b.headlines.ad_sales)}% ${arr(b.headlines.ad_sales)}
• Ad spend ${sign(b.headlines.ad_spend)}% ${arr(b.headlines.ad_spend)}
• Impressions ${sign(b.headlines.impressions)}% ${arr(b.headlines.impressions)}
• Clicks ${sign(b.headlines.clicks)}% ${arr(b.headlines.clicks)}
• ROAS delta: ${b.headlines.roas_delta>=0?'+':''}${b.headlines.roas_delta.toFixed(2)}x

This Week: ${F.d(b.tw_agg.sales)} ad sales on ${F.d(b.tw_agg.spend)} spend at ${F.r(b.tw_agg.roas)} ROAS (${b.tw_agg.orders} orders).
Prev Week: ${F.d(b.pw_agg.sales)} ad sales on ${F.d(b.pw_agg.spend)} spend at ${F.r(b.pw_agg.roas)} ROAS (${b.pw_agg.orders} orders).

#Wins
${winsTxt}

#Alerts @James Buell
${alertsTxt}

#Actions Logged This Week
${actionsTxt}

Best,
[Your name]`;

  $('#bfMdl').innerHTML=`
    <div class="lg-h"><h3>📨 Weekly Briefing — Draft for Review</h3><button class="cls" onclick="closeBriefing()">✕</button></div>
    <div class="bf-body">
      <div class="bf-meta">
        <div><b>To:</b> ${(CFG.briefing?.stakeholders_to||['Lesa Musatto','James Buell','Edouard Segain']).join(', ')}</div>
        <div><b>Cc:</b> ${(CFG.briefing?.stakeholders_cc||[]).join(', ')}</div>
        <div><b>Subject:</b> ${subject}</div>
        <div><b>Period:</b> ${wkLabel} (Sun–Sat) vs ${pwLabel}</div>
      </div>
      <div class="bf-warn">⚠ <b>Draft only.</b> Numbers auto-computed from cc_data.json. Verify before sending. This draft uses real WoW math but does NOT yet include YoY, MTD-to-target progress, Canada/Mexico breakdowns, or VC channel data — those will be added in Tier 2 with full data integration. <span class="prev-bdg">PREVIEW</span></div>
      <textarea class="bf-text" id="bfText">${draft}</textarea>
      <div class="bf-actions">
        <button class="act-btn" onclick="copyBriefing()">📋 Copy to Clipboard</button>
        <button class="act-btn" onclick="downloadBriefingMd()">⤓ Download as .md</button>
        <button class="act-btn" onclick="downloadBriefingPDF()">⤓ Download as PDF</button>
        <button class="act-btn" onclick="renderBriefing()">↻ Regenerate</button>
      </div>
    </div>
  `;
}
function copyBriefing(){const t=$('#bfText').value;navigator.clipboard.writeText(t).then(()=>{alert('Briefing copied to clipboard');},()=>{alert('Copy failed. Please select-all and copy manually.');});}
function downloadBriefingMd(){const t=$('#bfText').value;const blob=new Blob([t],{type:'text/markdown'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='briefing_'+new Date().toISOString().split('T')[0]+'.md';a.click();URL.revokeObjectURL(url);}
function downloadBriefingPDF(){
  const t=$('#bfText').value;
  // Simple PDF via window.print on a popup
  const w=window.open('','_blank','width=800,height=900');
  w.document.write(`<html><head><title>Weekly Briefing</title><style>body{font-family:Arial,sans-serif;padding:36px;line-height:1.6;font-size:11pt;color:#222;max-width:680px;margin:auto;}h1{font-size:14pt;color:#0066cc;}pre{white-space:pre-wrap;word-wrap:break-word;font-family:Arial;}</style></head><body><h1>Weekly Performance Briefing</h1><pre>${t.replace(/</g,'&lt;')}</pre><script>window.onload=()=>{window.print();}<\/script></body></html>`);
  w.document.close();
}


function openCamp(name){
  const c=D._computed.find(x=>x.n===name);if(!c)return;
  const m=c.m;const bg=$('#mbg');bg.classList.add('show');
  const triNames={cr:'🔴 Critical',wa:'🟠 Watch',st:'🟡 Steady',wi:'🟢 Winner',sa:'⭐ Star',in:'⚫ Inactive'};

  let h=`<h2>${c.n}</h2><div class="ms">${c.p} · ${triNames[c.t]} · ${c.reason}</div>`;

  // Metrics cards
  h+=`<div class="mg">`;
  [{l:'Impressions',v:F.n(m.imp)},{l:'Clicks',v:F.n(m.clicks)},{l:'Spend',v:F.d(m.spend)},{l:'Orders',v:m.orders},{l:'Sales',v:F.d(m.sales)},{l:'ACOS',v:F.p(m.acos),c:F.ac(m.acos)},{l:'ROAS',v:F.r(m.roas),c:F.rc(m.roas)}].forEach(i=>{
    let delta='';
    if(c.cmp){const bm=c.cmp.m;const key=i.l.toLowerCase();
      if(key==='spend')delta=`<div class="md ${c.cmp.d_spend.c}">${c.cmp.d_spend.t}</div>`;
      else if(key==='sales')delta=`<div class="md ${c.cmp.d_sales.c}">${c.cmp.d_sales.t}</div>`;
      else if(key==='roas')delta=`<div class="md ${c.cmp.d_roas.c}">${c.cmp.d_roas.t}</div>`;
    }
    h+=`<div class="mc"><div class="ml">${i.l}</div><div class="mv ${i.c||''}">${i.v}</div>${delta}</div>`;
  });
  h+=`</div>`;

  // Comparison table if enabled
  if(c.cmp){
    const bm=c.cmp.m;
    h+=`<div class="sc" style="background:var(--cd2);border-color:var(--or)"><div class="sh"><div class="st" style="color:var(--or)">Period Comparison</div></div><div class="tw"><table><thead><tr><th style="text-align:left">Period</th><th>Imp</th><th>Clicks</th><th>Spend</th><th>Orders</th><th>Sales</th><th>ACOS</th><th>ROAS</th></tr></thead><tbody>
    <tr><td style="text-align:left;color:var(--cy)">A: ${PA.s} → ${PA.e}</td><td>${F.n(m.imp)}</td><td>${F.n(m.clicks)}</td><td>${F.d(m.spend)}</td><td>${m.orders}</td><td>${F.d(m.sales)}</td><td class="${F.ac(m.acos)}">${F.p(m.acos)}</td><td class="${F.rc(m.roas)}">${F.r(m.roas)}</td></tr>
    <tr><td style="text-align:left;color:var(--or)">B: ${PB.s} → ${PB.e}</td><td>${F.n(bm.imp)}</td><td>${F.n(bm.clicks)}</td><td>${F.d(bm.spend)}</td><td>${bm.orders}</td><td>${F.d(bm.sales)}</td><td class="${F.ac(bm.acos)}">${F.p(bm.acos)}</td><td class="${F.rc(bm.roas)}">${F.r(bm.roas)}</td></tr>
    <tr style="border-top:2px solid var(--or)"><td style="text-align:left;font-weight:700;color:var(--tw)">Δ Change</td><td class="${F.dl(m.imp,bm.imp).c}">${F.dl(m.imp,bm.imp).t}</td><td class="${F.dl(m.clicks,bm.clicks).c}">${F.dl(m.clicks,bm.clicks).t}</td><td class="${c.cmp.d_spend.c}">${c.cmp.d_spend.t}</td><td class="${F.dl(m.orders,bm.orders).c}">${F.dl(m.orders,bm.orders).t}</td><td class="${c.cmp.d_sales.c}">${c.cmp.d_sales.t}</td><td class="${F.dl(m.acos>=999?0:m.acos,bm.acos>=999?0:bm.acos).c}">${F.dl(m.acos>=999?0:m.acos,bm.acos>=999?0:bm.acos).t}</td><td class="${c.cmp.d_roas.c}">${c.cmp.d_roas.t}</td></tr>
    </tbody></table></div></div>`;
  }

  // ASINs
  if(c.asins&&c.asins.length){
    h+=`<div class="sc" style="background:var(--cd2)"><div class="sh"><div class="st">Top ASINs</div></div><div class="tw"><table><thead><tr><th style="text-align:left">ASIN</th><th>Imp</th><th>Clicks</th><th>Spend</th><th>Orders</th><th>Sales</th><th>ACOS</th><th>ROAS</th></tr></thead><tbody>`;
    c.asins.forEach(a=>{h+=`<tr><td><a href="https://amazon.com/dp/${a.a}" target="_blank" style="color:var(--bl);text-decoration:none">${a.a}</a></td><td>${F.n(a.i)}</td><td>${F.n(a.c)}</td><td>${F.d(a.s)}</td><td>${a.o}</td><td>${F.d(a.r)}</td><td class="${F.ac(a.acos)}">${F.p(a.acos)}</td><td class="${F.rc(a.roas)}">${F.r(a.roas)}</td></tr>`;});
    h+=`</tbody></table></div></div>`;
  }

  // Targets
  if(c.targets&&c.targets.length){
    h+=`<div class="sc" style="background:var(--cd2)"><div class="sh"><div class="st">Top Targeting / Ad Groups</div></div><div class="tw"><table><thead><tr><th style="text-align:left">Ad Group</th><th style="text-align:left">ASIN</th><th>Imp</th><th>Clicks</th><th>Spend</th><th>Orders</th><th>Sales</th></tr></thead><tbody>`;
    c.targets.forEach(t=>{h+=`<tr><td>${t.ag}</td><td style="color:var(--bl)">${t.asin}</td><td>${F.n(t.i)}</td><td>${F.n(t.c)}</td><td>${F.d(t.s)}</td><td>${t.o}</td><td>${F.d(t.r)}</td></tr>`;});
    h+=`</tbody></table></div></div>`;
  }

  // Playbook History — past actions logged on this campaign
  const pastActions=ACTIONS.filter(a=>a.campaigns.includes(c.n));
  if(pastActions.length){
    h+=`<div class="sc" style="background:var(--cd2);border-color:var(--cy)"><div class="sh"><div class="st" style="color:var(--cy)">📋 Playbook History — ${pastActions.length} action${pastActions.length>1?'s':''} logged here</div></div>`;
    pastActions.slice(0,8).forEach(a=>{
      const v=computeVerdict(a,'mid');
      const types=a.action_types.map(t=>(ACT_META[t]||{}).l||t).join(' + ');
      const stat=v.status==='pending'?`<span style="color:var(--t3)">⏳ ${v.label}</span>`:`<span class="verd-${v.vClass}">${verdictIcon(v.vClass)} ${v.verdict} (${v.confidence})</span>`;
      h+=`<div style="padding:8px 0;border-bottom:1px solid var(--bd);font:500 11.5px/1.5 var(--sa);color:var(--t2)"><div style="color:var(--tw);font-weight:600">${a.date} · ${types}</div><div style="margin-top:3px">${stat}${v.reason?' · '+v.reason:''}</div>${a.notes?`<div style="font-size:10.5px;color:var(--t3);margin-top:3px">📝 ${a.notes}</div>`:''}</div>`;
    });
    if(pastActions.length>8)h+=`<div style="text-align:center;padding:8px;font:500 11px var(--mo);color:var(--t3)">+${pastActions.length-8} more — see Action Tracker tab</div>`;
    h+=`</div>`;
  }

  // Recommended actions + Log button
  h+=`<div class="sc" style="background:var(--cd2)"><div class="sh"><div class="st">Recommended Actions</div><button class="act-btn pri" onclick="openLogDialog('${c.n.replace(/'/g,"\\'")}')">+ Log Action</button></div>`;
  const acts=getActions(c);
  acts.forEach(a=>{h+=`<div style="padding:7px 0;border-bottom:1px solid var(--bd);font:400 12px/1.5 var(--sa);color:var(--t2)"><span style="color:${a.co};font-weight:700;margin-right:6px">${a.i}</span>${a.t}</div>`;});
  h+=`</div>`;

  $('#mc').innerHTML=h;
}

function getActions(c){
  const m=c.m;const a=[];
  if(c.t==='cr'){
    if(m.orders===0&&m.spend>30)a.push({i:'⏸',t:`PAUSE — ${F.d(m.spend)} spent with 0 orders. Audit targeting before re-enabling.`,co:'var(--rd)'});
    if(m.acos>60&&m.acos<999)a.push({i:'📉',t:`Reduce bids 30-40%. ACOS ${F.p(m.acos)} is extreme.`,co:'var(--rd)'});
    if(m.clicks>15&&m.orders===0)a.push({i:'🔍',t:`${m.clicks} clicks, 0 orders. Check: listing quality, price, search term relevance.`,co:'var(--or)'});
  }
  if(c.t==='wa'){
    if(m.acos>35&&m.acos<999)a.push({i:'🎯',t:`Reduce bids 15-20% to bring ACOS from ${F.p(m.acos)} toward 24%.`,co:'var(--or)'});
    if(m.ctr<0.2&&m.imp>3000)a.push({i:'🖼',t:`CTR ${m.ctr.toFixed(2)}% — test new main image or refine targeting.`,co:'var(--or)'});
    if(m.cvr<5&&m.clicks>20)a.push({i:'📄',t:`CVR ${F.p(m.cvr)} — check listing, reviews, price.`,co:'var(--or)'});
  }
  if(c.t==='wi'||c.t==='sa'){
    a.push({i:'💰',t:`${F.r(m.roas)} ROAS. Increase budget 20% to capture more revenue.`,co:'var(--gn)'});
    if(m.acos<15)a.push({i:'📈',t:`ACOS ${F.p(m.acos)} — increase bids for more top-of-search.`,co:'var(--gn)'});
  }
  if(c.t==='st')a.push({i:'🔄',t:`ROAS ${F.r(m.roas)} — harvest converting terms to exact, negate bleeders.`,co:'var(--yl)'});
  if(!a.length)a.push({i:'👁',t:'Monitor. No immediate action needed.',co:'var(--t3)'});
  return a;
}
